name: Deploy to Docker Hub and cloud

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: echo "No tests configured"

      - name: Build Docker image
        run: docker build -t middlemansafeplace:latest .

      - name: Publish Docker image
        if: github.event_name == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo $DOCKERHUB_TOKEN | docker login --username $DOCKERHUB_USERNAME --password-stdin
          docker tag middlemansafeplace:latest $DOCKERHUB_USERNAME/middlemansafeplace:latest
          docker push $DOCKERHUB_USERNAME/middlemansafeplace:latest
